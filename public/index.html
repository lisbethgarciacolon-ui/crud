<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mensajes de estado */
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin: 10px 0;
        }
        .success-message {
            color: #28a745;
            font-size: 14px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Gestor de Tareas</h1>
        </header>

        <div id="login" class="card">
            <h2>Iniciar Sesión</h2>
            <input id="user" class="input" placeholder="Usuario">
            <input id="pass" class="input" type="password" placeholder="Contraseña">
            <div class="buttons">
                <button class="primary" onclick="login()">Entrar</button>
                <button class="secondary" onclick="register()">Crear cuenta</button>
            </div>
        </div>

        <div id="app" class="card" style="display:none;">
            <h2>Bienvenido, <span id="usuarioNombre"></span></h2>

            <div class="add-task">
                <input id="titulo" class="input" placeholder="Nueva tarea">
                <button class="primary" onclick="crearTarea()">Agregar</button>
            </div>

            <ul id="lista"></ul>

            <button id="logoutBtn" class="secondary" onclick="logout()">Cerrar sesión</button>
        </div>

        <footer class="footer">
            <span>Simple CRUD de tareas con Node + SQLite</span>
        </footer>
    </div>

    <script src="gestor.js"></script>
</body>
</html>
